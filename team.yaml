# Kiro Multi-Agent Team Configuration
# 活動分析團隊

channel:
  bot_token_env: TELEGRAM_BOT_TOKEN
  group_id: -1003998901967
  general_topic_id: 1

access:
  mode: locked
  allowed_users: [8458242319]

defaults:
  backend: kiro-cli
  model: claude-opus-4.6

cost_guard:
  daily_limit_usd: 10.0
  warn_at_percentage: 80
  timezone: UTC

hang_detector:
  enabled: true
  timeout_minutes: 60

instances:
  # ─── 活動分析團隊 ───
  event-king:
    working_directory: ./agents/event-king
    description: "活動王 - 團隊領導，任務協調與分派"
    topic_id: 26
    role: leader
    general_topic: true

  analyst-andrew:
    working_directory: ./agents/analyst-andrew
    description: "分析安德魯 - 因果推論、活動成效分析"
    topic_id: 27
    role: worker

  monitor-anglo:
    working_directory: ./agents/monitor-anglo
    description: "體脂30安格魯 - 監控健檢、議題樹拆解、異常診斷"
    topic_id: 28
    role: worker

  data-hancock:
    working_directory: ./agents/data-hancock
    description: "漢考克盎格魯 - BigQuery 資料查詢與前處理"
    topic_id: 29
    role: worker

  cha-cha-gin-agent:
    working_directory: ./agents/cha-cha-gin-agent
    description: "查查君 - 自然語言數據查詢（Text2SQL API）"
    topic_id: 242
    role: worker

  # ─── 通用對話 ───
  kiro-cli-agent:
    working_directory: ./agents/kiro-cli-agent
    description: "Kiro-CLI Agent - 通用 AI 對話助手"
    topic_id: 201
    role: worker

health_port: 8470
