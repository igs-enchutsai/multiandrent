# 反饋分類規則設定
# 每個分類包含：名稱、描述、關鍵字（多語言）、嚴重程度權重

categories:
  - name: "Bug / 閃退"
    description: "程式錯誤、閃退、卡住等技術問題"
    severity_weight: 5
    keywords:
      - bug
      - error
      - crash
      - frozen
      - stuck
      - "cannot login"
      - "can't login"
      - glitch
      - broken
      - 閃退
      - 卡住
      - 錯誤
      - 登不進去
      - 當機
      - 黑屏
      - 白屏
      - バグ
      - エラー
      - 落ちる
      - フリーズ

  - name: "課金 / 商城 / 價格"
    description: "課金、禮包、價格相關反饋"
    severity_weight: 4
    keywords:
      - expensive
      - price
      - pack
      - gacha
      - rate
      - pity
      - overpriced
      - "pay to win"
      - p2w
      - 太貴
      - 課金
      - 禮包
      - 機率
      - 保底
      - 商城
      - 價格
      - 高すぎる
      - ガチャ
      - 確率
      - 課金

  - name: "玩法建議"
    description: "玩家希望新增或改善的功能"
    severity_weight: 3
    keywords:
      - "should add"
      - "please add"
      - suggestion
      - hope
      - wish
      - "would be nice"
      - "how about"
      - 希望
      - 建議
      - 可以加入
      - 能不能
      - 拜託加
      - 追加して
      - 改善して
      - 欲しい

  - name: "正面反饋"
    description: "玩家正面評價"
    severity_weight: 1
    keywords:
      - love
      - amazing
      - awesome
      - great
      - best
      - perfect
      - "well done"
      - fantastic
      - 好玩
      - 讚
      - 太棒了
      - 喜歡
      - 好評
      - 最高
      - 神ゲー
      - 楽しい
      - 素晴らしい

  - name: "負面反饋"
    description: "玩家負面評價（非特定分類）"
    severity_weight: 3
    keywords:
      - hate
      - worst
      - terrible
      - awful
      - trash
      - garbage
      - uninstall
      - quit
      - 爛
      - 垃圾
      - 刪遊戲
      - 退坑
      - 最差
      - クソゲー
      - つまらない
      - 引退

  - name: "活動建議"
    description: "遊戲活動相關反饋"
    severity_weight: 3
    keywords:
      - event
      - reward
      - "free stuff"
      - anniversary
      - celebration
      - 活動
      - 獎勵
      - 周年
      - 福利
      - イベント
      - 報酬

  - name: "平衡性問題"
    description: "角色/技能/數值平衡相關"
    severity_weight: 4
    keywords:
      - nerf
      - buff
      - overpowered
      - underpowered
      - broken
      - meta
      - balance
      - 削弱
      - 加強
      - 太強
      - 太弱
      - 平衡
      - ナーフ
      - バフ
      - 強すぎ

  - name: "美術 / 角色 / 造型"
    description: "美術風格、角色設計、造型相關"
    severity_weight: 2
    keywords:
      - skin
      - design
      - art
      - character
      - beautiful
      - ugly
      - 造型
      - 角色
      - 美術
      - 好看
      - 醜
      - スキン
      - キャラ
      - デザイン

  - name: "效能 / 連線問題"
    description: "效能、延遲、連線相關"
    severity_weight: 4
    keywords:
      - lag
      - latency
      - fps
      - performance
      - disconnect
      - server
      - ping
      - 延遲
      - 卡頓
      - 斷線
      - 伺服器
      - ラグ
      - 重い
      - 切断

  - name: "客服 / 補償"
    description: "客服品質、補償相關"
    severity_weight: 3
    keywords:
      - support
      - compensation
      - "customer service"
      - refund
      - 客服
      - 補償
      - 退款
      - サポート
      - 補填
      - 返金
